<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clip Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S-Clips">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --charcoal: #1a1a1a;
    --card: #222222;
    --border: #2e2e2e;
    --navy: #1B2A4A;
    --navy-bright: #2E4A7A;
    --navy-light: #3d6299;
    --white: #f0f0f0;
    --grey: #888888;
    --grey-light: #555555;
    --green: #2d6a4f;
    --green-bright: #40c076;
    --yellow: #b5820a;
    --yellow-bright: #f0a500;
    --red: #7a1f1f;
    --red-bright: #e03c3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    background: var(--charcoal);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--white);
    text-transform: uppercase;
  }

  .logo span { color: var(--navy-bright); }

  .account-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .account-tabs::-webkit-scrollbar { display: none; }

  .account-tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 16px;
    border-radius: 6px 6px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    cursor: pointer;
    white-space: nowrap;
    background: transparent;
    color: var(--grey);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .account-tab.active {
    background: var(--black);
    color: var(--white);
    border-color: var(--border);
  }

  .account-tab.add-tab {
    color: var(--navy-light);
    font-size: 18px;
    padding: 4px 14px;
  }

  .main {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--grey);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-header .edit-btn {
    font-size: 11px;
    color: var(--navy-light);
    cursor: pointer;
    letter-spacing: 1px;
    background: none;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
  }

  .sources-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .source-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .source-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 10px 0 0 10px;
  }

  .source-card.green::before { background: var(--green-bright); }
  .source-card.yellow::before { background: var(--yellow-bright); }
  .source-card.red::before { background: var(--red-bright); }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .green .status-dot { background: var(--green-bright); box-shadow: 0 0 6px var(--green-bright); }
  .yellow .status-dot { background: var(--yellow-bright); box-shadow: 0 0 6px var(--yellow-bright); }
  .red .status-dot { background: var(--red-bright); box-shadow: 0 0 6px var(--red-bright); }

  .source-info { flex: 1; }

  .source-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--white);
    margin-bottom: 3px;
  }

  .source-meta {
    font-size: 12px;
    color: var(--grey);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .source-type {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 3px;
  }

  .source-type.daily { background: rgba(46,74,122,0.3); color: var(--navy-light); }
  .source-type.biweekly { background: rgba(100,60,20,0.3); color: #c4874a; }

  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .pull-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--navy-bright);
    background: transparent;
    color: var(--navy-light);
    cursor: pointer;
    transition: all 0.15s;
  }

  .pull-btn:active { background: var(--navy); color: var(--white); }
  .pull-btn.pulled { border-color: var(--border); color: var(--grey-light); }

  .unlog-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid var(--red);
    background: transparent;
    color: var(--red-bright);
    cursor: pointer;
    text-align: center;
    opacity: 0.7;
  }

  .unlog-btn:active { opacity: 1; background: var(--red); }

  .hashtag-section { margin-bottom: 24px; }

  .hashtag-categories {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .category-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--grey);
    cursor: pointer;
    transition: all 0.15s;
  }

  .category-btn.active {
    background: var(--navy);
    border-color: var(--navy-bright);
    color: var(--white);
  }

  .hashtag-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .hashtag-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--grey);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .hashtag-chip.selected {
    background: var(--navy);
    border-color: var(--navy-bright);
    color: var(--white);
  }

  .hashtag-chip.disabled { opacity: 0.35; cursor: not-allowed; }

  .copy-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .copy-box-tags {
    font-size: 14px;
    color: var(--navy-light);
    flex: 1;
    line-height: 1.6;
    word-break: break-all;
  }

  .copy-box-placeholder { color: var(--grey-light); font-size: 13px; font-style: italic; }

  .copy-action-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: var(--navy-bright);
    color: var(--white);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .copy-action-btn:active { opacity: 0.8; }
  .copy-action-btn.copied { background: var(--green); }

  .source-selector { margin-bottom: 10px; }

  .source-selector label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--grey);
    display: block;
    margin-bottom: 6px;
  }

  .source-select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    appearance: none;
    cursor: pointer;
  }

  .counter-text { font-size: 12px; color: var(--grey); text-align: right; margin-top: 6px; }
  .counter-text span { color: var(--navy-light); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--charcoal);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 20px 16px 40px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--grey);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .modal-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    margin-bottom: 10px;
    outline: none;
  }

  .modal-input:focus { border-color: var(--navy-bright); }

  .modal-btn {
    width: 100%;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: var(--navy-bright);
    color: var(--white);
    cursor: pointer;
    margin-top: 8px;
  }

  .edit-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .edit-list-item:last-child { border-bottom: none; }

  .edit-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
  }

  .edit-item-meta { font-size: 12px; color: var(--grey); margin-top: 2px; }

  .delete-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    background: var(--red);
    border: none;
    color: var(--white);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .placeholder-content {
    text-align: center;
    padding: 60px 20px;
  }

  .placeholder-content h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    text-transform: uppercase;
    color: var(--grey-light);
    margin-bottom: 10px;
  }

  .placeholder-content p { color: var(--grey); font-size: 14px; margin-bottom: 24px; }

  .big-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    background: var(--navy-bright);
    color: var(--white);
    cursor: pointer;
    display: inline-block;
  }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    border: 1px solid var(--navy-bright);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px 24px;
    border-radius: 8px;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  select option { background: var(--charcoal); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Clip<span>Tracker</span></div>
  </div>
  <div class="account-tabs" id="accountTabs"></div>
</div>

<div class="main" id="mainContent"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_DATA = {
  activeAccount: 0,
  accounts: [
    {
      id: 'unredacted',
      name: 'Unredacted Clips',
      sources: [
        { id: 's1', name: 'Shawn Ryan Show', type: 'biweekly', lastPulled: null },
        { id: 's2', name: 'Mike Drop', type: 'biweekly', lastPulled: null },
        { id: 's3', name: 'Combat Story', type: 'biweekly', lastPulled: null },
        { id: 's4', name: 'Cleared Hot', type: 'biweekly', lastPulled: null },
        { id: 's5', name: 'Explore With Us', type: 'daily', lastPulled: null },
        { id: 's6', name: 'Law & Crime', type: 'daily', lastPulled: null },
        { id: 's7', name: 'Criminally Listed', type: 'daily', lastPulled: null },
      ],
      hashtags: {
        military: ['#military','#specialoperations','#combatvet','#navyseal','#greenberets','#specialforces','#veteranstories','#operator'],
        truecrime: ['#truecrime','#crimestories','#interrogation','#criminalpsychology','#coldcase','#truecrimecommunity','#unsolved','#crimetok']
      }
    },
    {
      id: 'itzrawkut',
      name: 'itzRawKut',
      sources: [],
      hashtags: { military: [], truecrime: [] }
    }
  ]
};

function loadData() {
  try {
    const saved = localStorage.getItem('cliptracker_v2');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) {
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem('cliptracker_v2', JSON.stringify(appData));
}

let appData = loadData();

// ── STATUS: resets at local midnight ──────────────────────────────────────────
function getTodayMidnight() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function getStatus(source) {
  if (!source.lastPulled) return 'green';
  const midnight = getTodayMidnight();
  const yesterdayMidnight = midnight - 86400000;

  if (source.type === 'daily') {
    // Green if pulled before today's midnight
    return source.lastPulled < midnight ? 'green' : 'red';
  } else {
    // Biweekly: green if pulled before yesterday midnight, yellow if yesterday, red if today
    if (source.lastPulled < yesterdayMidnight) return 'green';
    if (source.lastPulled < midnight) return 'yellow';
    return 'red';
  }
}

function getLastPulledText(source) {
  if (!source.lastPulled) return 'Never pulled';
  const diff = Date.now() - source.lastPulled;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  if (mins < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours/24)}d ago`;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedHashtags = [];
let selectedSourceForHash = '';
let activeHashCategory = 'military';

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() { renderTabs(); renderMain(); }

function renderTabs() {
  const tabs = document.getElementById('accountTabs');
  tabs.innerHTML = '';
  appData.accounts.forEach((acc, i) => {
    const tab = document.createElement('button');
    tab.className = 'account-tab' + (i === appData.activeAccount ? ' active' : '');
    tab.textContent = acc.name;
    tab.onclick = () => {
      appData.activeAccount = i;
      selectedHashtags = [];
      selectedSourceForHash = '';
      saveData();
      render();
    };
    tabs.appendChild(tab);
  });
  const addTab = document.createElement('button');
  addTab.className = 'account-tab add-tab';
  addTab.textContent = '+';
  addTab.onclick = () => showAddAccountModal();
  tabs.appendChild(addTab);
}

function renderMain() {
  const main = document.getElementById('mainContent');
  const acc = appData.accounts[appData.activeAccount];

  if (acc.sources.length === 0) {
    main.innerHTML = `
      <div class="placeholder-content">
        <h2>${acc.name}</h2>
        <p>No sources added yet.</p>
        <button class="big-btn" onclick="showAddSourceModal()">+ Add Source</button>
      </div>`;
    return;
  }

  const statusOrder = { green: 0, yellow: 1, red: 2 };
  const sorted = [...acc.sources].sort((a,b) => statusOrder[getStatus(a)] - statusOrder[getStatus(b)]);

  main.innerHTML = `
    <div class="section-header" style="margin-top:4px">
      <span>Sources</span>
      <button class="edit-btn" onclick="showEditSourcesModal()">Edit</button>
    </div>
    <div class="sources-grid" id="sourcesGrid"></div>
    <div class="divider"></div>
    <div class="hashtag-section">
      <div class="section-header">
        <span>Hashtag Bank</span>
        <button class="edit-btn" onclick="showEditHashtagsModal()">Edit</button>
      </div>
      <div class="hashtag-categories">
        <button class="category-btn ${activeHashCategory==='military'?'active':''}" onclick="setHashCategory('military')">🎖 Military</button>
        <button class="category-btn ${activeHashCategory==='truecrime'?'active':''}" onclick="setHashCategory('truecrime')">🔍 True Crime</button>
      </div>
      <div class="hashtag-bank" id="hashtagBank"></div>
      <div class="source-selector">
        <label>Source Tag (auto-added as 5th)</label>
        <select class="source-select" id="sourceSelect" onchange="setSourceTag(this.value)">
          <option value="">— Select source —</option>
          ${acc.sources.map(s => {
            const tag = '#'+s.name.replace(/\s+/g,'').replace(/&/g,'and').toLowerCase();
            return `<option value="${tag}" ${selectedSourceForHash===tag?'selected':''}>${s.name}</option>`;
          }).join('')}
        </select>
      </div>
      <div class="copy-box">
        <div class="copy-box-tags" id="copyBoxTags">
          ${buildCopyText()
            ? `<span>${buildCopyText()}</span>`
            : '<span class="copy-box-placeholder">Select up to 4 tags + source</span>'}
        </div>
        <button class="copy-action-btn" id="copyBtn" onclick="copyHashtags()">Copy</button>
      </div>
      <div class="counter-text"><span>${selectedHashtags.length}</span>/4 tags selected</div>
    </div>
  `;

  const grid = document.getElementById('sourcesGrid');
  sorted.forEach(source => {
    const status = getStatus(source);
    const card = document.createElement('div');
    card.className = `source-card ${status}`;
    const hasPulled = !!source.lastPulled;
    card.innerHTML = `
      <div class="status-dot"></div>
      <div class="source-info">
        <div class="source-name">${source.name}</div>
        <div class="source-meta">
          <span class="source-type ${source.type}">${source.type==='daily'?'Daily':'Biweekly'}</span>
          <span>${getLastPulledText(source)}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="pull-btn ${status==='red'?'pulled':''}" onclick="logPull('${source.id}',event)">
          ${status==='red'?'Pulled':'Pull'}
        </button>
        ${hasPulled ? `<button class="unlog-btn" onclick="unlogPull('${source.id}',event)">Undo</button>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  renderHashtags();
}

function renderHashtags() {
  const acc = appData.accounts[appData.activeAccount];
  const bank = document.getElementById('hashtagBank');
  if (!bank) return;
  const tags = acc.hashtags[activeHashCategory] || [];
  bank.innerHTML = tags.map(tag => {
    const isSelected = selectedHashtags.includes(tag);
    const isDisabled = !isSelected && selectedHashtags.length >= 4;
    return `<div class="hashtag-chip ${isSelected?'selected':''} ${isDisabled?'disabled':''}" onclick="toggleHashtag('${tag}')">${tag}</div>`;
  }).join('');
}

function buildCopyText() {
  const all = [...selectedHashtags];
  if (selectedSourceForHash) all.push(selectedSourceForHash);
  return all.join(' ');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function logPull(sourceId, e) {
  e.stopPropagation();
  const acc = appData.accounts[appData.activeAccount];
  const source = acc.sources.find(s => s.id === sourceId);
  if (!source) return;
  source.lastPulled = Date.now();
  saveData();
  render();
  showToast(`Logged — ${source.name}`);
}

function unlogPull(sourceId, e) {
  e.stopPropagation();
  const acc = appData.accounts[appData.activeAccount];
  const source = acc.sources.find(s => s.id === sourceId);
  if (!source) return;
  source.lastPulled = null;
  saveData();
  render();
  showToast(`Unlogged — ${source.name}`);
}

function setHashCategory(cat) {
  activeHashCategory = cat;
  renderMain();
}

function setSourceTag(val) {
  selectedSourceForHash = val;
  updateCopyBox();
}

function toggleHashtag(tag) {
  const idx = selectedHashtags.indexOf(tag);
  if (idx > -1) {
    selectedHashtags.splice(idx, 1);
  } else {
    if (selectedHashtags.length >= 4) return;
    selectedHashtags.push(tag);
  }
  renderHashtags();
  updateCopyBox();
}

function updateCopyBox() {
  const box = document.getElementById('copyBoxTags');
  const counter = document.querySelector('.counter-text span');
  if (box) {
    const text = buildCopyText();
    box.innerHTML = text
      ? `<span>${text}</span>`
      : '<span class="copy-box-placeholder">Select up to 4 tags + source</span>';
  }
  if (counter) counter.textContent = selectedHashtags.length;
}

function copyHashtags() {
  const text = buildCopyText();
  if (!text) { showToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }
    showToast('Hashtags copied!');
  }).catch(() => showToast('Copy failed — try again'));
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function showAddSourceModal() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Add Source</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <input class="modal-input" id="newSourceName" placeholder="Source name" />
    <select class="source-select" id="newSourceType" style="margin-bottom:10px">
      <option value="daily">Daily</option>
      <option value="biweekly">Biweekly</option>
    </select>
    <button class="modal-btn" onclick="addSource()">Add Source</button>
  `);
}

function addSource() {
  const name = document.getElementById('newSourceName').value.trim();
  const type = document.getElementById('newSourceType').value;
  if (!name) { showToast('Enter a source name'); return; }
  const acc = appData.accounts[appData.activeAccount];
  acc.sources.push({ id: 's'+Date.now(), name, type, lastPulled: null });
  saveData();
  closeModal();
  render();
  showToast(`${name} added`);
}

function showEditSourcesModal() {
  const acc = appData.accounts[appData.activeAccount];
  const items = acc.sources.map(s => `
    <div class="edit-list-item">
      <div>
        <div class="edit-item-name">${s.name}</div>
        <div class="edit-item-meta">${s.type} • ${getLastPulledText(s)}</div>
      </div>
      <button class="delete-btn" onclick="deleteSource('${s.id}')">×</button>
    </div>`).join('');
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Edit Sources</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div>${items || '<p style="color:var(--grey);text-align:center;padding:20px 0">No sources yet</p>'}</div>
    <button class="modal-btn" onclick="closeModal();showAddSourceModal()">+ Add Source</button>
  `);
}

function deleteSource(id) {
  const acc = appData.accounts[appData.activeAccount];
  acc.sources = acc.sources.filter(s => s.id !== id);
  saveData();
  showEditSourcesModal();
  render();
}

function showEditHashtagsModal() {
  const acc = appData.accounts[appData.activeAccount];
  const allTags = [
    ...(acc.hashtags.military||[]).map(t=>({tag:t,cat:'military'})),
    ...(acc.hashtags.truecrime||[]).map(t=>({tag:t,cat:'truecrime'}))
  ];
  const items = allTags.map(({tag,cat}) => `
    <div class="edit-list-item">
      <div>
        <div class="edit-item-name">${tag}</div>
        <div class="edit-item-meta">${cat==='military'?'🎖 Military':'🔍 True Crime'}</div>
      </div>
      <button class="delete-btn" onclick="deleteHashtag('${tag}','${cat}')">×</button>
    </div>`).join('');
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Edit Hashtags</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div>${items || '<p style="color:var(--grey);text-align:center;padding:20px 0">No hashtags yet</p>'}</div>
    <div style="margin-top:16px">
      <input class="modal-input" id="newHashTag" placeholder="#newtag" />
      <select class="source-select" id="newHashCat" style="margin-bottom:10px">
        <option value="military">🎖 Military</option>
        <option value="truecrime">🔍 True Crime</option>
      </select>
      <button class="modal-btn" onclick="addHashtag()">Add Hashtag</button>
    </div>
  `);
}

function addHashtag() {
  let tag = document.getElementById('newHashTag').value.trim();
  const cat = document.getElementById('newHashCat').value;
  if (!tag) { showToast('Enter a hashtag'); return; }
  if (!tag.startsWith('#')) tag = '#' + tag;
  const acc = appData.accounts[appData.activeAccount];
  if (!acc.hashtags[cat]) acc.hashtags[cat] = [];
  if (acc.hashtags[cat].includes(tag)) { showToast('Tag already exists'); return; }
  acc.hashtags[cat].push(tag);
  saveData();
  showEditHashtagsModal();
  render();
}

function deleteHashtag(tag, cat) {
  const acc = appData.accounts[appData.activeAccount];
  acc.hashtags[cat] = (acc.hashtags[cat]||[]).filter(t => t !== tag);
  saveData();
  showEditHashtagsModal();
  render();
}

function showAddAccountModal() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">New Account</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <input class="modal-input" id="newAccName" placeholder="Account name" />
    <button class="modal-btn" onclick="addAccount()">Create Account</button>
  `);
}

function addAccount() {
  const name = document.getElementById('newAccName').value.trim();
  if (!name) { showToast('Enter an account name'); return; }
  appData.accounts.push({
    id: 'acc'+Date.now(),
    name,
    sources: [],
    hashtags: { military: [], truecrime: [] }
  });
  appData.activeAccount = appData.accounts.length - 1;
  saveData();
  closeModal();
  selectedHashtags = [];
  selectedSourceForHash = '';
  render();
  showToast(`${name} created`);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
